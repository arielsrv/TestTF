apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: remitee
namePrefix: testtf--
generatorOptions:
  disableNameSuffixHash: true
resources:
- config.yaml
- deployment.yaml
- hpa.yaml
- ingress.yaml
- service.yaml
labels:
- includeSelectors: true
  pairs:
    app: testtf
    environment: production
